<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>DiscoverCC</title>
    <link rel="stylesheet" href="style.css">

  </head>
  <body>
    <section class="w-full">
      <nav class="w-full h-14 flex flex-col bg-[#393E46]">
        <div class="w-full h-14 grid grid-cols-2">
          <div class="w-full h-14 bg-[#000000] flex flex-row justify-center p-3 border-b-4 border-white">
            <div class="text-white text-lg">DiscoverCC</div>
          </div>
           <div class="w-full h-14 bg-[#000000] flex flex-row justify-end gap-4 p-3 border-b-4 border-white">
            <button class="w-24 h-8 text-white border-white border-2 rounded-md hover:bg-orange-600 hover:border-white hover:text-white">Home</button>
            <button class="w-24 h-8 text-white border-white border-2 rounded-md hover:bg-orange-600 hover:border-white hover:text-white">Contact us</button>
           </div>
        </div>
      </nav>
    </section>

    <section class="w-full h-auto"> 
      <div class="w-full h-auto bg-[#00000] flex flex-row">
        <div class="w-full h-auto bg-[#000000] flex flex-col justify-center">
          <div class="w-full h-auto flex flex-row justify-center mt-12">
            <div class="h-auto p-2 flex flex-row justify-center items-center gap-2 border-b-4 rounded-xl border-solid border-white hover:bg-orange-600">
              <img class="w-8 h-8 object-contain" src="/images/location_white.png">
              <h1 class="text-white"> Nottingham, UK</h1>
            </div>            
          </div>
        
          <div class="w-full h-auto bg-[#000000] flex flex-col justify-center items-center">
            <h1 class="mt-6 font-[font1] text-7xl text-white">Discovering YouTubers</h1>
            <p class="font-[font2] text-xl text-white">A community-curated space for local content creators. Browse, discover and support local creators near you. </p>
             
            <div class="w-[220px] h-auto p-2 mt-6 mb-6 bg-orange-500 flex flex-row justify-center items-center gap-2 border-4 rounded-xl border-dashed border-white hover:bg-orange-600">
                <img class="w-8 h-auto object-contain" src="/images/send.png">
                <h1 class="text-white">Submit a Creator</h1>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="index.js"></script>

  </body>
</html>
